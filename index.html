function startApp(){loginScreen.style.display="none";app.style.display="flex";buildTOC();showIntro();}
function exitApp(){ location.reload(); }
function buildTOC(){tocList.innerHTML=`<div onclick="showIntro()">📖 المقدمة</div>`;cases.forEach((c,i)=>tocList.innerHTML+=`<div onclick="openCase(${i})">${c.title}</div>`);tocList.innerHTML+=`<div onclick="showConclusion()">📖 الخاتمة</div>`;}
function showIntro(){content.innerHTML=`<h2 style="text-align:center;font-family:'Amiri';color:#FFD700;">﷽<br></h2><div class="step"><b>📖 نبذة:</b><br>الإسعافات الأولية هي الرعاية الفورية للحفاظ على حياة المصاب ومنع تدهور حالته حتى وصول الرعاية الطبية.</div><div class="step"><b>👨‍⚕️ تعريف المسعف:</b><br>هو الشخص المدرب القادر على تقييم الحالة وتقديم التدخل السريع بشكل آمن.</div><div class="step"><b>🧠 صفات المسعف:</b><br>الهدوء – سرعة التصرف – الدقة – تحمل المسؤولية – المعرفة الأساسية بالإسعافات.</div><div class="step"><b>⚠️ الاحتياطات:</b><br>تأمين المكان – حماية النفس – استخدام أدوات الحماية – طلب المساعدة فورًا.</div><div class="step"><b>🎯 الأهداف:</b><br>إنقاذ الحياة – منع التدهور – تعزيز الشفاء.</div>`;}
function openCase(i){const c=cases[i];content.innerHTML=`<h2>${c.title}</h2><img src="images/${c.img}.jpg"><video controls><source src="videos/${c.video}.mp4"></video><div class="step"><b>📌 التعريف:</b><br>${c.def}</div><div class="step"><b>⚠️ الأسباب:</b><br>${c.causes}</div><div class="step"><b>🩺 الأعراض والعلامات:</b><br>${c.sym}</div><div class="step"><b>🚑 الإجراءات المتخذة:</b><br>${c.steps.join("<br>")}</div><div class="step" style="background:#ffeb3b;color:#111;"><b>💡 نصيحة مهمة:</b><br>${c.tip}</div><textarea id="note${i}" placeholder="ملاحظاتك...">${localStorage.getItem('n'+i)||''}</textarea><button class="btn save" onclick="saveNote(${i})">💾 حفظ</button>`;showTip(c.tip);progress(i);}
function saveNote(i){localStorage.setItem('n'+i, document.getElementById('note'+i).value);}
function progress(i){progressBar.style.width=((i+1)/cases.length*100)+'%';}
function showTip(t){tip.innerText=t;tip.style.display="block";setTimeout(()=>tip.style.display="none",3000);}
function showConclusion(){content.innerHTML=`<img src="images/conclusion.jpg" style="width:100%;border-radius:15px;margin-bottom:15px;"><h2 style="text-align:center;">📖 ختاماً</h2><div class="step">الطريق الصحيح للوقاية من المخاطر الصحية يبدأ أولاً بالعودة إلى الله، ثانياً بالتوبة العملية والالتزام بالتعليمات وطاعة التوجيهات الصحية.</div><div class="step" style="text-align:center;">السيد عبدالملك بدر الدين الحوثي<br>المحاضرة الرمضانية العاشرة – 1441 هـ</div>`;}
