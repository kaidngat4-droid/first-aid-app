<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚑 دليل الإسعافات الأولية - د. صلاح الأهدل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE67RHFDNM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

    <style>
        /* 1. التنسيقات العامة */
        :root { --primary: #ef4444; --bg-dark: #0f172a; --card-dark: #1e293b; --yemen-red: #CE1126; --yemen-gold: #B8860B; --glass-bg: rgba(15, 23, 42, 0.85); }
        body { margin: 0; font-family: 'Tajawal', sans-serif; background: var(--bg-dark); color: white; transition: 0.3s; overflow-x: hidden; }
        body.light { background: #f1f5f9; }
        
        /* 2. شريط التقدم والهيدر */
        #progressBar { position: fixed; top: 0; right: 0; height: 5px; background: var(--primary); width: 0%; z-index: 10000; transition: 0.4s; }
        header { background: var(--card-dark); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 2px solid var(--primary); }
        body.light header { background: #fff; color: #1e293b; }

        /* 🌌 خلفية نيونية احترافية */
        #loginScreen {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #020617 0%, #000000 100%); overflow: hidden; z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* 🌈 خطوط نيونية متحركة */
        #loginScreen::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: repeating-linear-gradient(90deg, rgba(255, 0, 128, 0.08) 0px, rgba(0, 255, 255, 0.08) 2px, transparent 2px, transparent 40px);
            animation: moveGrid 8s linear infinite;
        }

        @keyframes moveGrid { from { transform: translateY(0); } to { transform: translateY(40px); } }

        /* ✨ الكرت الزجاجي */
        .login-card {
            background: rgba(0, 0, 0, 0.6); padding: 45px 30px; border-radius: 30px; text-align: center;
            width: 90%; max-width: 420px; backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), 0 0 80px rgba(255, 0, 128, 0.2); animation: fadeIn 1.5s ease; position: relative; z-index: 2;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9);} to { opacity: 1; transform: scale(1);} }

        /* 👨‍⚕️ أيقونة الطبيب */
        .pulse-heart { font-size: 60px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; text-shadow: 0 0 20px #00ffff, 0 0 30px #ff0080; }
        
        @keyframes float { 0% { transform: translateY(0);} 50% { transform: translateY(-10px);} 100% { transform: translateY(0);} }

        /* 🔥 العنوان */
        .main-title { font-family: 'Cairo', sans-serif; font-size: 28px; font-weight: 900; background: linear-gradient(90deg, #00ffff, #ff0080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0;}
        .official-header { position: absolute; top: 20px; left: 0; right: 0; text-align: center; color: white; font-family: 'Amiri', serif; z-index: 2; }
        .republic-text { font-size: 20px; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .ministry-text { font-size: 14px; opacity: 0.9; margin-top: 4px; }
        
        /* 🏷️ النص الفرعي */
        .district-tag { color: #ccc; font-size: 14px; margin-bottom: 30px; display: block; }

        /* 🚀 زر الدخول النيوني */
        .entry-btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer;
            background: linear-gradient(90deg, #ff0080, #7c3aed, #00ffff); color: white; transition: 0.4s; box-shadow: 0 0 20px rgba(255,0,128,0.5);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .entry-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(0,255,255,0.8); }

        /* ✍️ التوقيع */
        .signature { margin-top: 25px; color: #aaa; display: flex; flex-direction: column; }
        .dr-name { font-weight: bold; color: white; }

        /* 4. شبكة الأيقونات الدائرية (الفهرس) */
        #tocGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 25px; max-width: 700px; margin: 0 auto; }
        .grid-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .grid-item:hover { transform: translateY(-5px); }
        .icon-circle {
            width: 110px; height: 110px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); margin-bottom: 10px; display: flex; justify-content: center; align-items: center; font-size: 50px;
        }
        .icon-circle img { width: 100%; height: 100%; object-fit: cover; }
        .grid-item span { font-size: 14px; font-weight: bold; text-align: center; color: inherit; }
        body.light .grid-item span { color: #1e293b; }

        /* 5. عرض الحالة */
        #caseView { display: none; padding: 20px; max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        .case-media { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .case-media img, .case-media video { width: 100%; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: block; }
        
        .info-box { background: var(--card-dark); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid var(--primary); line-height: 1.8; }
        body.light .info-box { background: #fff; color: #1e293b; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .info-box h3 { margin-top: 0; color: var(--primary); font-size: 18px; margin-bottom: 10px;}
        .info-box ul { padding-inline-start: 20px; margin: 0; }

        /* 6. أزرار التحكم والملاحظات */
        .controls-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .back-btn { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit;}
        .back-btn:hover { background: #b91c1c; }
        .print-btn { padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit;}
        .print-btn:hover { background: #059669; }
        .note-input { width: 100%; box-sizing: border-box; padding: 15px; border-radius: 10px; border: 1px solid #475569; background: #334155; color: white; font-family: inherit; font-size: 15px; resize: vertical; margin-bottom: 10px; min-height: 100px; }
        body.light .note-input { background: #f1f5f9; border: 1px solid #cbd5e1; color: #1e293b; }
        .note-input:focus { outline: 2px solid #3b82f6; }
        .save-btn { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit; }
        .save-btn:hover { background: #2563eb; }
        
        .emergency-fab {
            position: fixed; bottom: 25px; left: 25px; background: #b91c1c; color: white; padding: 15px 25px; border-radius: 50px;
            text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(185,28,28,0.4); z-index: 1000; animation: pulse 2s infinite; display: none;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .bottom-controls { display: flex; gap: 10px; padding: 20px; max-width: 700px; margin: 0 auto; }
        .btn-ctrl { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit;}
        .btn-ctrl:hover { opacity: 0.9; }

        .save-status { margin-right: 12px; font-size: 14px; opacity: 0; transition: opacity 0.3s; color: #22c55e; }
        body.light .save-status { color: #15803d; }
        
        .table-responsive { overflow-x: auto; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-dark); color: white; border-radius: 12px; overflow: hidden; }
        body.light table { background: #fff; color: #1e293b; border: 1px solid #e2e8f0; }
        th, td { border: 1px solid #475569; padding: 10px; text-align: center; font-size: 13px; }
        th { background: #334155; color: white; }
        body.light th { background: #cbd5e1; color: #0f172a; }

        @media(max-width: 480px) {
            #tocGrid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
            .icon-circle { width: 90px; height: 90px; font-size: 40px; }
            .emergency-fab { bottom: 15px; left: 15px; padding: 12px 20px; font-size: 14px; }
        }

        /* 7. تنسيقات الطباعة الاحترافية */
        @media print {
            body { background: white !important; color: black !important; }
            #loginScreen, .emergency-fab, .bottom-controls, #tocGrid, .back-btn, .print-btn, .save-btn { display: none !important; }
            header { background: white !important; color: black !important; box-shadow: none !important; border-bottom: 2px solid #000; padding: 10px 0; }
            #caseView { display: block !important; padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .case-media video { display: none !important; }
            .case-media img { max-height: 250px; object-fit: contain; border-radius: 0; box-shadow: none; border: 1px solid #ddd; }
            .info-box { background: white !important; color: black !important; border: 1px solid #ccc !important; box-shadow: none !important; border-right: 5px solid #000 !important; page-break-inside: avoid; }
            .info-box h3 { color: black !important; }
            .note-input { border: 1px dashed #ccc !important; background: transparent !important; color: black !important; resize: none; overflow: visible; height: auto; }
            @page { margin: 1cm; size: A4 portrait; }
        }
    </style>
</head>
<body>

    <div id="progressBar"></div>

    <a href="tel:777774883" class="emergency-fab" id="emergencyFab">📞 اتصال طارئ</a>

    <div id="loginScreen">
        <div class="official-header">
            <div class="republic-text">الجمهورية اليمنية</div>
            <div class="ministry-text">وزارة الصحة والبيئة</div>
        </div>
        <div class="login-card">
            <div class="pulse-heart">🚑</div>
            <h1 class="main-title">دليل الإسعافات الأولية</h1>
            <span class="district-tag">مكتب الصحة والبيئة - العدين</span>
            
            <button class="entry-btn" onclick="initApp()">
                <span>دخول الي الدليل</span>
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd"></path>
                </svg>
            </button>

            <div class="signature">
                <span class="dr-name">د. صلاح قاسم الأهدل</span>
                <span class="dr-title">مدير مكتب الصحة والبيئة بالمديرية</span>
            </div>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <header>
            <h2 id="headerTitle" style="margin:0; font-family:'Cairo', sans-serif;">القائمة الرئيسية</h2>
        </header>
        
        <div id="tocGrid"></div>

        <div id="caseView">
            <div class="controls-header">
                <button class="back-btn" onclick="goBack()">🔙 العودة للفهرس</button>
                <button class="print-btn" onclick="window.print()">🖨️ طباعة الحالة</button>
            </div>
            <div id="caseDetail"></div>
        </div>

        <div class="bottom-controls" id="bottomControls">
            <button class="btn-ctrl" style="background:#6366f1; color:white;" onclick="toggleTheme()">🌓 تغيير الوضع</button>
            <button class="btn-ctrl" style="background:#475569; color:white;" onclick="location.reload()">🚪 خروج</button>
        </div>
    </div>

    <script>
        const cases = [
        {
          title:"🫀 الإنعاش القلبي (CPR)",
          img:"cpr",
          video:"cpr",
          def:`الإنعاش القلبي الرئوي هو سلسلة من الخطوات الإسعافية المتتالية التي تهدف إلى الحفاظ على تدفق الدم والأكسجين إلى الدماغ والأعضاء الحيوية عند توقف القلب أو التنفس بشكل مفاجئ. الهدف ليس "إعادة القلب للعمل" دائماً بالضغط اليدوي، بل منع موت الدماغ حتى وصول التجهيزات المتقدمة (الصدمة الكهربائية).`,
          causes:`فقدان الوعي المفاجئ: عدم الاستجابة للمؤثرات الصوتية أو الحركية.<br>توقف التنفس أو "التنفس الاحتضاري": عدم وجود حركة للصدر أو شهيق متقطع وغير فعال.<br>غياب النبض المركزي: عدم جس النبض في الشريان السباتي خلال 10 ثوانٍ.`,
          sym:`فقدان الوعي، توقف التنفس، غياب النبض.`,
          steps:[
            `1️⃣ تأمين الموقع (Scene Safety): تأكد أن المكان آمن لك وللمريض.`,
            `2️⃣ فحص الاستجابة وطلب المساعدة (Response & Activation): هز المريض والنداء بصوت عالٍ، إذا لم يستجب اطلب المساعدة فوراً.`,
            `3️⃣ الضغطات الصدرية (Circulation - C): منتصف الصدر، عمق 5-6 سم، سرعة 100-120 ضغطة/دقيقة، السماح بالارتداد الكامل، عدم التوقف أكثر من 10 ثوانٍ.`,
            `4️⃣ فتح مجرى الهواء (Airway - A): إمالة الرأس ورفع الذقن لفتح مجرى الهواء.`,
            `5️⃣ التنفس الاصطناعي (Breathing - B): نفسان بعد كل 30 ضغطة، مدة ثانية واحدة للنفس الواحد، مراقبة ارتفاع الصدر.`,
            `6️⃣ استخدام جهاز AED: بمجرد توفره، لإنهاء الرجفان البطيني وإعادة النظم الطبيعي للقلب.`,
            `7️⃣ متى نتوقف عن الإنعاش؟: ROSC، وصول الفريق الطبي، إنهاك المسعف، أو وجود خطر يهدد حياته.`,
            `💡 ملاحظة: Hands-only CPR للمسعف غير المدرب أو لمنع العدوى، فعالة جداً في الدقائق الأولى.`,
            `🔹 البروتوكولات العالمية ACLS: قاعدة 5Hs & 5Ts للتشخيص السريع للأسباب القابلة للعكس.`,
            `– 5Hs: Hypovolemia, Hypoxia, Acidosis, Hyper/Hypokalemia, Hypothermia.`,
            `– 5Ts: Tension Pneumothorax, Tamponade, Toxins, Pulmonary Thrombosis, Coronary Thrombosis.`,
            `– أسباب شائعة محلياً: Electric Shock, Trauma, إرهاق شديد.`,
            `📝 <b>جدول ملخص للتشخيص السريع:</b><br>نزيف: شحوب، نبض ضعيف وسريع → تعويض السوائل والدم.<br>نقص أكسجين: ازرقاق → فتح مجرى الهواء وأكسجين 100%.<br>جلطة قلبية: ألم صدر → نقل عاجل لمركز القسطرة.<br>سموم: اتساع/ضيق الحدقة، بقايا أدوية → إعطاء الادرينالين إن وجد.`
          ],
          tip:`كل ثانية تأخير تقلل فرصة النجاة`
        },
        {
          title:"🧠 السكتة الدماغية والجلطة القلبية",
          img:"stroke_mi",
          video:"stroke_mi",
          def:`السكتة الدماغية (Stroke) تحدث عند انقطاع الدم عن جزء من الدماغ. أما الجلطة القلبية (MI) فهي انسداد مفاجئ في تروية عضلة القلب. كلاهما حالات مهددة للحياة تتطلب تدخلًا فوريًا.`,
          causes:`ارتفاع ضغط الدم، السكري، التدخين، أمراض القلب، والجلطات العابرة.`,
          sym:`<b>السكتة الدماغية (قاعدة FAST):</b><br>
          - <b>F (Face):</b> تدلي أحد جانبي الوجه عند الابتسام.<br>
          - <b>A (Arms):</b> ضعف في أحد الذراعين عند رفعهما.<br>
          - <b>S (Speech):</b> صعوبة في الكلام أو كلام غير مفهوم.<br>
          - <b>T (Time):</b> الوقت حرج جداً اتصل بالطوارئ فوراً.<br>
          <b>الجلطة القلبية:</b> ألم ضاغط في الصدر، ضيق تنفس، عرق بارد، ألم يمتد للفك أو الذراع الأيسر.`,
          steps:[
            `1️⃣ الاتصال فوراً بمدير الطوارئ أو أقرب مركز قسطرة.`,
            `2️⃣ إجلاس المصاب في وضعية مريحة (وضعية نصف الجلوس).`,
            `3️⃣ فك الملابس الضيقة حول الرقبة والخصر.`,
            `4️⃣ إذا كان واعياً ولا يوجد حساسية، يمكن إعطاؤه قرص أسبرين (مضغ) لتقليل التجلط.`,
            `5️⃣ مراقبة التنفس والنبض باستمرار؛ في حال فقدان الوعي نبدأ CPR فوراً.`
          ],
          tip:"الوقت هو الدماغ والوقت هو العضلة؛ كل دقيقة تأخير تعني تلفاً لا يمكن إصلاحه."
        },
        {
          title:"🐝 الصدمة التحسسية الحادة",
          img:"anaphylaxis",
          video:"anaphylaxis",
          def:`رد فعل تحسسي شديد وفوري يصيب كامل الجسم، مما يؤدي لضيق الممرات الهوائية وهبوط حاد في ضغط الدم.`,
          causes:`لدغات الحشرات (النحل، الدبابير)، بعض الأدوية (مثل البنسلين)، أو بعض الأطعمة.`,
          sym:`تورم الوجه واللسان، صعوبة شديدة في التنفس، طفح جلدي واسع، غثيان، دوار شديد وفقدان وعي.`,
          steps:[
            `1️⃣ إبعاد المسبب (مثل نزع إبرة النحلة دون عصرها).`,
            `2️⃣ استخدام حقنة الأدرينالين (EpiPen) إذا كانت متوفرة لدى المريض (تُحقن في عضلة الفخذ الخارجية).`,
            `3️⃣ وضع المصاب مستلقياً على ظهره مع رفع قدميه (لتحسين الضغط).`,
            `4️⃣ إذا كان هناك تورم في اللسان وصعوبة تنفس، يجب تأمين مجرى الهواء بأي وسيلة متاحة.`,
            `5️⃣ نقل المريض فوراً للمستشفى لأن مفعول الأدرينالين قد ينتهي وتعود الصدمة.`
          ],
          tip:"الأدرينالين هو المنقذ الوحيد للحياة في هذه الحالة."
        },
        {
          title:"💧 ضربة الشمس والجفاف",
          img:"heatstroke",
          video:"heatstroke",
          def:`ارتفاع درجة حرارة الجسم لأكثر من 40 درجة مئوية بسبب التعرض الطويل للحرارة، مما يؤدي لفشل نظام تنظيم الحرارة في الدماغ.`,
          causes:`العمل الشاق تحت الشمس، نقص شرب السوائل، خاصة عند الأطفال وكبار السن.`,
          sym:`ارتفاع كبير في الحرارة، جلد جاف وساخن (بدون عرق)، صداع، تشوش ذهني، تشنجات، أو فقدان وعي.`,
          steps:[
            `1️⃣ نقل المصاب فوراً إلى مكان بارد أو مظلل.`,
            `2️⃣ تبريد الجسم بسرعة: رش الماء البارد، استخدام الكمادات، أو وضع قطع ثلج تحت الإبطين وبين الفخذين.`,
            `3️⃣ إذا كان واعياً، إعطاؤه سوائل باردة أو محلول إرواء تدريجياً.`,
            `4️⃣ مراقبة علامات الجفاف الحاد (مرتبط ببروتوكول IMCI للأطفال).`,
            `5️⃣ عدم إعطاء خافضات حرارة (مثل الباراسيتامول) لأنها لا تنفع في ضربة الشمس.`
          ],
          tip:"التبريد السريع للجسم هو الأولوية القصوى لمنع تلف الدماغ."
        },
        {
          title:"🤮 الغرق",

        function saveNote(caseIndex) {
            const noteContent = document.getElementById(`noteInput_${caseIndex}`).value;
            localStorage.setItem('case_note_' + caseIndex, noteContent);
            const statusLabel = document.getElementById(`saveStatus_${caseIndex}`);
            statusLabel.style.opacity = "1";
            setTimeout(() => { statusLabel.style.opacity = "0"; }, 2000);
        }

        function saveDrugsNote() {
            const noteContent = document.getElementById(`noteInput_drugs`).value;
            localStorage.setItem('drugs_note', noteContent);
            const statusLabel = document.getElementById(`saveStatus_drugs`);
            if(statusLabel) statusLabel.style.opacity = "1";
            setTimeout(() => { if(statusLabel) statusLabel.style.opacity = "0"; }, 2000);
        }
