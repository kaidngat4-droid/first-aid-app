<style>
/* التنسيقات الأساسية */
body { margin: 0; font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; transition: 0.3s; }
body.light { background: #f0f0f0; color: #111; }

/* شاشة البداية */
#loginScreen { position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url("images/ambulance.jpg") center/cover; z-index: 2000; }
.login-card { background: rgba(0,0,0,0.75); padding: 40px 50px; border-radius: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
.title { font-size: 42px; color: #FFD700; font-family: 'Amiri'; margin-bottom: 15px; }
.start-btn { padding: 15px 40px; background: linear-gradient(45deg, #ff4c4c, #dc2626); border: none; color: white; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.3s; }
.start-btn:hover { transform: scale(1.05); }
.dev-title { margin-top: 20px; color: #00ffff; animation: blink 2s infinite; }
.dev-name { font-weight: bold; font-size: 18px; }
@keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

/* زر الطوارئ الاحترافي */
.emergency-fab {
    position: fixed;
    bottom: 30px;
    left: 30px;
    background: linear-gradient(135deg, #e11d48, #9f1239);
    color: white;
    padding: 12px 25px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    box-shadow: 0 10px 20px rgba(225, 29, 72, 0.4);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1000;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: pulse-red 2s infinite;
}
.emergency-fab:hover { transform: scale(1.05); }
.i-icon { font-size: 22px; }

@keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); }
    100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
}

/* تخطيط التطبيق */
.container { display: flex; height: 100vh; }
.sidebar { width: 260px; background: #1e293b; overflow-y: auto; padding: 10px; box-shadow: -2px 0 10px rgba(0,0,0,0.5); z-index: 100;}
.content { flex: 1; padding: 15px; overflow-y: auto; padding-bottom: 80px; }
#tocList div { padding: 10px; margin: 6px 0; background: #334155; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;}
#tocList div:hover { background: #dc2626; color: white; }

/* محتوى الحالات */
img, video { width: 100%; border-radius: 10px; margin: 10px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: block; }
.step { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 10px; border-right: 4px solid #3b82f6; line-height: 1.6; }
body.light .step { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

/* الأزرار */
.btn { padding: 10px 15px; margin: 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
.btn:hover { opacity: 0.9; }
.print { background: #2563eb; color: white; }
.save { background: #16a34a; color: white; width: auto;}
.exit { background: #dc2626; color: white; }
.theme { background: #9333ea; color: white; }

/* أشرطة التقدم والتنبيهات */
#progressBar { position: fixed; top: 0; left: 0; height: 6px; background: #ff4c4c; width: 0%; z-index: 3000; transition: 0.4s ease; }
#tip { position: fixed; top: 15px; right: 50%; transform: translateX(50%); background: #ffeb3b; color: #111; padding: 10px 20px; display: none; z-index: 4000; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
textarea { width: 100%; border-radius: 10px; padding: 15px; border: none; margin-top: 10px; background: #334155; color: white; box-sizing: border-box; resize: vertical; }
body.light textarea { background: #e2e8f0; color: #111; }

/* شاشات الجوال */
@media(max-width: 768px) {
    .sidebar { width: 120px; font-size: 13px; }
    .emergency-fab span:not(.i-icon) { display: none; }
    .emergency-fab { padding: 15px; border-radius: 50%; bottom: 20px; left: 20px; }
    .content { padding: 10px; padding-bottom: 80px; }
}
</style>

const cases = [
{
  title:"🫀 الإنعاش القلبي (CPR)",
  img:"cpr",
  video:"cpr",
  def:`الإنعاش القلبي الرئوي هو سلسلة من الخطوات الإسعافية المتتالية التي تهدف إلى الحفاظ على تدفق الدم والأكسجين إلى الدماغ والأعضاء الحيوية عند توقف القلب أو التنفس بشكل مفاجئ. الهدف ليس "إعادة القلب للعمل" دائماً بالضغط اليدوي، بل منع موت الدماغ حتى وصول التجهيزات المتقدمة (الصدمة الكهربائية).`,
  causes:`فقدان الوعي المفاجئ: عدم الاستجابة للمؤثرات الصوتية أو الحركية.<br>توقف التنفس أو "التنفس الاحتضاري": عدم وجود حركة للصدر أو شهيق متقطع وغير فعال.<br>غياب النبض المركزي: عدم جس النبض في الشريان السباتي خلال 10 ثوانٍ.`,
  sym:`فقدان الوعي، توقف التنفس، غياب النبض.`,
  steps:[
    `1️⃣ تأمين الموقع (Scene Safety): تأكد أن المكان آمن لك وللمريض.`,
    `2️⃣ فحص الاستجابة وطلب المساعدة (Response & Activation): هز المريض والنداء بصوت عالٍ، إذا لم يستجب اطلب المساعدة فوراً.`,
    `3️⃣ الضغطات الصدرية (Circulation - C): منتصف الصدر، عمق 5-6 سم، سرعة 100-120 ضغطة/دقيقة، السماح بالارتداد الكامل، عدم التوقف أكثر من 10 ثوانٍ.`,
    `4️⃣ فتح مجرى الهواء (Airway - A): إمالة الرأس ورفع الذقن لفتح مجرى الهواء.`,
    `5️⃣ التنفس الاصطناعي (Breathing - B): نفسان بعد كل 30 ضغطة، مدة ثانية واحدة للنفس الواحد، مراقبة ارتفاع الصدر.`,
    `6️⃣ استخدام جهاز AED: بمجرد توفره، لإنهاء الرجفان البطيني وإعادة النظم الطبيعي للقلب.`,
    `7️⃣ متى نتوقف عن الإنعاش؟: ROSC، وصول الفريق الطبي، إنهاك المسعف، أو وجود خطر يهدد حياته.`,
    `💡 ملاحظة: Hands-only CPR للمسعف غير المدرب أو لمنع العدوى، فعالة جداً في الدقائق الأولى.`,
    `🔹 البروتوكولات العالمية ACLS: قاعدة 5Hs & 5Ts للتشخيص السريع للأسباب القابلة للعكس.`,
    `– 5Hs: Hypovolemia, Hypoxia, Acidosis, Hyper/Hypokalemia, Hypothermia.`,
    `– 5Ts: Tension Pneumothorax, Tamponade, Toxins, Pulmonary Thrombosis, Coronary Thrombosis.`,
    `– أسباب شائعة محلياً: Electric Shock, Trauma, إرهاق شديد.`,
    `📝 جدول ملخص للتشخيص السريع: نزيف: شحوب، نبض ضعيف وسريع → تعويض السوائل والدم.<br>نقص أكسجين: ازرقاق → فتح مجرى الهواء وأكسجين 100%.<br>جلطة قلبية: ألم صدر → نقل عاجل لمركز القسطرة.<br>سموم: اتساع/ضيق الحدقة، بقايا أدوية → إعطاء الادرينالين إن وجد.`
  ],
  tip:`كل ثانية تأخير تقلل فرصة النجاة`
},
{
  title:"🧠 السكتة الدماغية والجلطة القلبية",
  img:"stroke_mi",
  video:"stroke_mi",
  def:`السكتة الدماغية (Stroke) تحدث عند انقطاع الدم عن جزء من الدماغ. أما الجلطة القلبية (MI) فهي انسداد مفاجئ في تروية عضلة القلب. كلاهما حالات مهددة للحياة تتطلب تدخلًا فوريًا.`,
  causes:`ارتفاع ضغط الدم، السكري، التدخين، أمراض القلب، والجلطات العابرة.`,
  sym:`<b>السكتة الدماغية (قاعدة FAST):</b><br>
  - <b>F (Face):</b> تدلي أحد جانبي الوجه عند الابتسام.<br>
  - <b>A (Arms):</b> ضعف في أحد الذراعين عند رفعهما.<br>
  - <b>S (Speech):</b> صعوبة في الكلام أو كلام غير مفهوم.<br>
  - <b>T (Time):</b> الوقت حرج جداً اتصل بالطوارئ فوراً.<br>
  <b>الجلطة القلبية:</b> ألم ضاغط في الصدر، ضيق تنفس، عرق بارد، ألم يمتد للفك أو الذراع الأيسر.`,
  steps:[
    `1️⃣ الاتصال فوراً بمدير الطوارئ أو أقرب مركز قسطرة.`,
    `2️⃣ إجلاس المصاب في وضعية مريحة (وضعية نصف الجلوس).`,
    `3️⃣ فك الملابس الضيقة حول الرقبة والخصر.`,
    `4️⃣ إذا كان واعياً ولا يوجد حساسية، يمكن إعطاؤه قرص أسبرين (مضغ) لتقليل التجلط.`,
    `5️⃣ مراقبة التنفس والنبض باستمرار؛ في حال فقدان الوعي نبدأ CPR فوراً.`
  ],
  tip:"الوقت هو الدماغ والوقت هو العضلة؛ كل دقيقة تأخير تعني تلفاً لا يمكن إصلاحه."
},
{
  title:"🐝 الصدمة التحسسية الحادة",
  img:"anaphylaxis",
  video:"anaphylaxis",
  def:`رد فعل تحسسي شديد وفوري يصيب كامل الجسم، مما يؤدي لضيق الممرات الهوائية وهبوط حاد في ضغط الدم.`,
  causes:`لدغات الحشرات (النحل، الدبابير)، بعض الأدوية (مثل البنسلين)، أو بعض الأطعمة.`,
  sym:`تورم الوجه واللسان، صعوبة شديدة في التنفس، طفح جلدي واسع، غثيان، دوار شديد وفقدان وعي.`,

    `3️⃣ وضع المصاب مستلقياً على ظهره مع رفع قدميه (لتحسين الضغط).`,
    `4️⃣ إذا كان هناك تورم في اللسان وصعوبة تنفس، يجب تأمين مجرى الهواء بأي وسيلة متاحة.`,
    `5️⃣ نقل المريض فوراً للمستشفى لأن مفعول الأدرينالين قد ينتهي وتعود الصدمة.`
  ],
  tip:"الأدرينالين هو المنقذ الوحيد للحياة في هذه الحالة."

{
  title:"💧 ضربة الشمس والجفاف",
  img:"heatstroke",
  video:"heatstroke",
  def:`ارتفاع درجة حرارة الجسم لأكثر من 40 درجة مئوية بسبب التعرض الطويل للحرارة، مما يؤدي لفشل نظام تنظيم الحرارة في الدماغ.`,
  causes:`العمل الشاق تحت الشمس، نقص شرب السوائل، خاصة عند الأطفال وكبار السن.`,
  sym:`ارتفاع كبير في الحرارة، جلد جاف وساخن (بدون عرق)، صداع، تشوش ذهني، تشنجات، أو فقدان وعي.`,
  steps:[

    `5️⃣ عدم إعطاء خافضات حرارة (مثل الباراسيتامول) لأنها لا تنفع في ضربة الشمس.`
  ],
  tip:"التبريد السريع للجسم هو الأولوية القصوى لمنع تلف الدماغ."
},
{
  title:"🤮 الغرق",
  img:"drowning",
  video:"drowning",
  def:`فشل التنفس نتيجة انغمار الأنف والفم بالسوائل، مما يؤدي لنقص الأكسجين في الدماغ.`,
  causes:`السقوط في الآبار، السدود، أو تجمعات المياه.`,
  sym:`انقطاع التنفس، زرقة الوجه والأطراف، خروج رغوة من الفم، فقدان الوعي.`,

    `3️⃣ <b>هام:</b> ابدأ بـ 5 أنفاس إنقاذية أولاً (قبل الضغطات الصدرية) لأن المشكلة تنفسية وليست قلبية في الأصل.`,

    `5️⃣ لا تحاول إخراج الماء من الرئتين بالضغط على البطن؛ الإنعاش هو الذي سيطرد الماء.`
  ],
  tip:"حتى لو أفاق المصاب، يجب نقله للمستشفى لخطر 'الغرق الثانوي' وتجمع السوائل في الرئة."
},
{
  title:"🤰 نزيف ما بعد الولادة",
  img:"pph",
  video:"pph",
  def:`فقدان كمية كبيرة من الدم (أكثر من 500 مل) بعد الولادة، وهو المسبب الأول لوفيات الأمهات ميدانياً.`,
  causes:`عدم انقباض الرحم (Atony)، تمزقات القناة المهبلية، أو بقاء أجزاء من المشيمة.`,
  sym:`نزيف مهبلي غزير ومستمر، شحوب، نبض سريع وضعيف، هبوط الضغط، الشعور بالدوخة.`,
  steps:[

    `5️⃣ إرضاع الطفل فوراً قد يساعد في إفراز هرمون الأوكسيتوسين الطبيعي لتقبض الرحم.`
  ],
  tip:"التدليك المستمر للرحم هو الإجراء المنقذ للحياة حتى وصول المساعدة."
},
{
  title:"🩸 النزيف",

  video:"bleeding",
  def:`النزيف هو فقدان الدم من الدورة الدموية نتيجة تمزق الأوعية الدموية (شرايين، أوردة، شعيرات). فقدان كمية كبيرة من الدم يؤدي إلى صدمة نقص الحجم (Hypovolemic Shock).`,
  causes:`جروح، حوادث، طعنات، كسور حادة، إصابات ناتجة عن آلات حادة أو حوادث مرورية.`,
  sym:`العلامات الظاهرة: جرح مفتوح، تدفق دم، تجمع دموي تحت الجلد.<br>علامات الصدمة: شحوب وبرودة الجلد، عرق بارد، نبض سريع وضعيف، تشوش ذهني، انخفاض ضغط الدم.<br>النزيف الداخلي: ألم شديد في البطن أو الصدر، خروج دم من فتحات الجسم الطبيعية، تورم صلب.`,

  sym:`الألم الشديد، التشوه، التورم، الزرقة، فقدان الوظيفة، صوت طرقعة عند تحريك العظم.`,
  steps:[

function startApp() { 
  loginScreen.style.display = "none"; 
  app.style.display = "flex"; 
  buildTOC(); 
  showIntro(); 
}

function exitApp() { 
  location.reload(); 
}

function buildTOC() {
  tocList.innerHTML = `<div onclick="showIntro()">📖 المقدمة</div>`;
  cases.forEach((c, i) => {
    tocList.innerHTML += `<div onclick="openCase(${i})">${c.title}</div>`;
  });
  tocList.innerHTML += `<div onclick="showConclusion()">📖 الخاتمة</div>`;
}

function showIntro() {
  content.innerHTML = `<h2 style="text-align:center;font-family:'Amiri';color:#FFD700;">﷽<br></h2>
  <div class="step" style="border-right-color:#ff4c4c; background:var(--bg-card, #2d1b1b); color:inherit;">
      <h3 style="margin-top:0;">🚨 أرقام الطوارئ الهامة (مكتب الصحة)</h3>
      <b>مدير الطوارئ: بكيل الجحافي</b><br>
      <i>يرجى الضغط على زر "الطوارئ" العائم أسفل الشاشة للاتصال المباشر في الحالات الحرجة.</i>
  </div>
  <div class="step"><b>📖 نبذة:</b><br>الإسعافات الأولية هي الرعاية الفورية للحفاظ على حياة المصاب ومنع تدهور حالته حتى وصول الرعاية الطبية.</div>
  <div class="step"><b>👨‍⚕️ تعريف المسعف:</b><br>هو الشخص المدرب القادر على تقييم الحالة وتقديم التدخل السريع بشكل آمن.</div>
  <div class="step"><b>🧠 صفات المسعف:</b><br>الهدوء – سرعة التصرف – الدقة – تحمل المسؤولية – المعرفة الأساسية بالإسعافات.</div>
  <div class="step"><b>⚠️ الاحتياطات:</b><br>تأمين المكان – حماية النفس – استخدام أدوات الحماية – طلب المساعدة فورًا.</div>
  <div class="step"><b>🎯 الأهداف:</b><br>إنقاذ الحياة – منع تدهور – تعزيز الشفاء.</div>`;
  progressBar.style.width = '0%';
}

function openCase(i) {
  const c = cases[i];
  content.innerHTML = `<h2>${c.title}</h2>
  
  <img src="images/${c.img}.jpg" onerror="this.src='https://via.placeholder.com/800x400?text=First+Aid'">
  
  <video controls poster="images/${c.img}.jpg">
    <source src="videos/${c.video}.mp4" type="video/mp4">
    متصفحك لا يدعم تشغيل الفيديو.
  </video>

  <div class="step"><b>📌 التعريف:</b><br>${c.def}</div>
  <div class="step"><b>⚠️ الأسباب:</b><br>${c.causes}</div>
  <div class="step"><b>🩺 الأعراض والعلامات:</b><br>${c.sym}</div>
  <div class="step"><b>🚑 الإجراءات المتخذة:</b><br>${c.steps.join("<br>")}</div>
  <div class="step" style="background:#ffeb3b;color:#111; border-right-color:#f59e0b;"><b>💡 نصيحة مهمة:</b><br>${c.tip}</div>
  <textarea id="note${i}" placeholder="أضف ملاحظاتك الميدانية هنا...">${localStorage.getItem('n'+i) || ''}</textarea>
  <button class="btn save" onclick="saveNote(${i})">💾 حفظ الملاحظات</button>`;
  
  showTip(c.tip);
  progress(i);
  content.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveNote(i) {
  localStorage.setItem('n' + i, document.getElementById('note' + i).value);
  showTip("تم حفظ الملاحظة بنجاح ✅");
}

function progress(i) {
  progressBar.style.width = ((i + 1) / cases.length * 100) + '%';
}

function showTip(t) {
  tip.innerText = t;
  tip.style.display = "block";
  setTimeout(() => tip.style.display = "none", 3000);
}

function showConclusion() {
  content.innerHTML = `<img src="images/conclusion.jpg" onerror="this.style.display='none'" style="width:100%;border-radius:15px;margin-bottom:15px;">
  <h2 style="text-align:center;">📖 ختاماً</h2>
  <div class="step">الطريق الصحيح للوقاية من المخاطر الصحية يبدأ أولاً بالعودة إلى الله، ثانياً بالتوبة العملية والالتزام بالتعليمات وطاعة التوجيهات الصحية.</div>
  <div class="step" style="text-align:center;">السيد عبدالملك بدر الدين الحوثي<br>المحاضرة الرمضانية العاشرة – 1441 هـ</div>`;
  progressBar.style.width = '100%';
}

function toggleTheme() {
  document.body.classList.toggle("light");
}
</script>
