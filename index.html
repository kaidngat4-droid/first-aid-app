<html lang="ar" dir="rtl">
<head>

    <title>🚑 دليل الإسعافات الأولية - د. صلاح الأهدل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ef4444; --bg-dark: #0f172a; --card-dark: #1e293b; }
        
        body { margin: 0; font-family: 'Tajawal', sans-serif; background: var(--bg-dark); color: white; transition: 0.3s; overflow-x: hidden; }
        body.light { background: #f8fafc; color: #1e293b; }

        /* شاشة البداية */
        #loginScreen { position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url("images/1001491511.png") center/cover; z-index: 2000; }
        .login-card { background: rgba(0,0,0,0.85); padding: 40px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .title { font-size: 36px; color: #FFD700; font-family: 'Amiri'; margin-bottom: 20px; }
        .start-btn { width: 100%; padding: 15px; background: linear-gradient(45deg, #ef4444, #b91c1c); border: none; color: white; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .start-btn:hover { transform: scale(1.05); }
        .dev-info { margin-top: 25px; color: #38bdf8; font-size: 14px; }
        .dev-name { display: block; font-size: 20px; color: #fff; font-weight: bold; margin-top: 5px; }

        /* الهيدر وشريط التقدم */
        header { background: var(--card-dark); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        body.light header { background: #fff; color: #1e293b; }
        #progressBar { position: fixed; top: 0; left: 0; height: 5px; background: var(--primary); width: 0%; z-index: 3000; transition: 0.4s; }

        /* شبكة الأيقونات الدائرية (الفهرس) */
        #tocGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 25px; max-width: 700px; margin: 0 auto; }
        .grid-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .grid-item:hover { transform: translateY(-5px); }
        
        .icon-circle { 
            width: 110px; height: 110px; background: #fff; border-radius: 50%; 
            overflow: hidden; border: 3px solid var(--primary); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); margin-bottom: 10px;
            display: flex; justify-content: center; align-items: center;
        }
        .icon-circle img { width: 100%; height: 100%; object-fit: cover; }
        .grid-item span { font-size: 14px; font-weight: bold; text-align: center; }

        /* عرض الحالة */
        #caseView { display: none; padding: 20px; max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        .case-media { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .case-media img, .case-media video { width: 100%; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: block; }
        
        .info-box { background: var(--card-dark); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid var(--primary); line-height: 1.8; }
        body.light .info-box { background: #fff; color: #1e293b; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .info-box h3 { margin-top: 0; color: var(--primary); font-size: 18px; margin-bottom: 10px;}

        /* أزرار التحكم والطباعة والملاحظات */
        .controls-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-btn:hover { background: #b91c1c; }
        .print-btn { padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .print-btn:hover { background: #059669; }
        
        /* تنسيق حقل الملاحظات */
        .note-input { width: 100%; box-sizing: border-box; padding: 15px; border-radius: 10px; border: 1px solid #475569; background: #334155; color: white; font-family: inherit; font-size: 15px; resize: vertical; margin-bottom: 10px; min-height: 100px; }
        body.light .note-input { background: #f1f5f9; border: 1px solid #cbd5e1; color: #1e293b; }
        .note-input:focus { outline: 2px solid #3b82f6; }
        .save-btn { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-family: inherit; }
        .save-btn:hover { background: #2563eb; }
        .save-status { margin-right: 15px; color: #10b981; font-weight: bold; font-size: 14px; opacity: 0; transition: opacity 0.3s; }

        .emergency-fab { position: fixed; bottom: 25px; left: 25px; background: #b91c1c; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(185,28,28,0.4); z-index: 1000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .bottom-controls { display: flex; gap: 10px; padding: 20px; max-width: 700px; margin: 0 auto; }
        .btn-ctrl { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-ctrl:hover { opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: inherit; }
        th, td { border: 1px solid #475569; padding: 10px; text-align: center; font-size: 13px; }
        th { background: #334155; color: white; }
        body.light th { background: #cbd5e1; color: #0f172a; }
        .table-responsive { overflow-x: auto; }

        @media(max-width: 480px) {
            #tocGrid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
            .icon-circle { width: 90px; height: 90px; }
            .emergency-fab { bottom: 15px; left: 15px; padding: 12px 20px; font-size: 14px; }
        }

        /* ====== تنسيقات الطباعة الاحترافية ====== */
        @media print {
            body { background: white !important; color: black !important; }
            #loginScreen, .emergency-fab, .bottom-controls, #tocGrid, .back-btn, .print-btn, .save-btn { display: none !important; }
            header { background: white !important; color: black !important; box-shadow: none !important; border-bottom: 2px solid #000; padding: 10px 0; }
            #caseView { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
            .case-media video { display: none !important; } /* إخفاء الفيديو عند الطباعة */
            .case-media img { max-height: 250px; object-fit: contain; border-radius: 0; box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
            .info-box { background: white !important; color: black !important; border: 1px solid #ccc !important; box-shadow: none !important; border-right: 5px solid #000 !important; page-break-inside: avoid; }
            .info-box h3 { color: black !important; }
            th { background: #eee !important; color: black !important; }
            td, th { border: 1px solid #000 !important; }
            .note-input { border: 1px dashed #ccc !important; background: transparent !important; color: black !important; resize: none; overflow: visible; height: auto; }
            @page { margin: 1cm; size: A4 portrait; }
        }
    </style>
</head>
<body>

    <div id="progressBar"></div>

    <a href="tel:777774883" class="emergency-fab">📞 اتصال طارئ</a>

    <div id="loginScreen">
      <div class="login-card">
        <div class="title">🚑 دليل الإسعافات الأولية</div>
        <button class="start-btn" onclick="initApp()">دخول النظام</button>
        <div class="dev-info">إشراف وتطوير:<span class="dev-name">د/ صلاح قاسم الأهدل</span></div>
      </div>
    </div>

    <div id="mainApp" style="display:none;">
        <header><h2 id="headerTitle" style="margin:0;">القائمة الرئيسية</h2></header>

        <div id="tocGrid"></div>

        <div id="caseView">
            <div class="controls-header">
                <button class="back-btn" onclick="goBack()">🔙 العودة للفهرس</button>
                <button class="print-btn" onclick="window.print()">🖨️ طباعة الحالة</button>
            </div>
            <div id="caseDetail"></div>
        </div>

        <div class="bottom-controls" id="bottomControls">
            <button class="btn-ctrl" style="background:#6366f1; color:white;" onclick="toggleTheme()">🌓 تغيير الوضع</button>
            <button class="btn-ctrl" style="background:#475569; color:white;" onclick="location.reload()">🚪 خروج</button>
        </div>
    </div>

    <script>
        const cases = [
        {
          title:"🫀 الإنعاش القلبي (CPR)",
          img:"cpr",
          video:"cpr",
          def:`الإنعاش القلبي الرئوي هو سلسلة من الخطوات الإسعافية المتتالية التي تهدف إلى الحفاظ على تدفق الدم والأكسجين إلى الدماغ والأعضاء الحيوية عند توقف القلب أو التنفس بشكل مفاجئ. الهدف ليس "إعادة القلب للعمل" دائماً بالضغط اليدوي، بل منع موت الدماغ حتى وصول التجهيزات المتقدمة (الصدمة الكهربائية).`,
          causes:`فقدان الوعي المفاجئ: عدم الاستجابة للمؤثرات الصوتية أو الحركية.<br>توقف التنفس أو "التنفس الاحتضاري": عدم وجود حركة للصدر أو شهيق متقطع وغير فعال.<br>غياب النبض المركزي: عدم جس النبض في الشريان السباتي خلال 10 ثوانٍ.`,
          sym:`فقدان الوعي، توقف التنفس، غياب النبض.`,
          steps:[
            `1️⃣ تأمين الموقع (Scene Safety): تأكد أن المكان آمن لك وللمريض.`,
            `2️⃣ فحص الاستجابة وطلب المساعدة (Response & Activation): هز المريض والنداء بصوت عالٍ، إذا لم يستجب اطلب المساعدة فوراً.`,
            `3️⃣ الضغطات الصدرية (Circulation - C): منتصف الصدر، عمق 5-6 سم، سرعة 100-120 ضغطة/دقيقة، السماح بالارتداد الكامل، عدم التوقف أكثر من 10 ثوانٍ.`,
            `4️⃣ فتح مجرى الهواء (Airway - A): إمالة الرأس ورفع الذقن لفتح مجرى الهواء.`,
            `5️⃣ التنفس الاصطناعي (Breathing - B): نفسان بعد كل 30 ضغطة، مدة ثانية واحدة للنفس الواحد، مراقبة ارتفاع الصدر.`,
            `6️⃣ استخدام جهاز AED: بمجرد توفره، لإنهاء الرجفان البطيني وإعادة النظم الطبيعي للقلب.`,
            `7️⃣ متى نتوقف عن الإنعاش؟: ROSC، وصول الفريق الطبي، إنهاك المسعف، أو وجود خطر يهدد حياته.`,
            `💡 ملاحظة: Hands-only CPR للمسعف غير المدرب أو لمنع العدوى، فعالة جداً في الدقائق الأولى.`,
            `🔹 البروتوكولات العالمية ACLS: قاعدة 5Hs & 5Ts للتشخيص السريع للأسباب القابلة للعكس.`,
            `– 5Hs: Hypovolemia, Hypoxia, Acidosis, Hyper/Hypokalemia, Hypothermia.`,
            `– 5Ts: Tension Pneumothorax, Tamponade, Toxins, Pulmonary Thrombosis, Coronary Thrombosis.`,
            `– أسباب شائعة محلياً: Electric Shock, Trauma, إرهاق شديد.`,
            `📝 <b>جدول ملخص للتشخيص السريع:</b><br>نزيف: شحوب، نبض ضعيف وسريع → تعويض السوائل والدم.<br>نقص أكسجين: ازرقاق → فتح مجرى الهواء وأكسجين 100%.<br>جلطة قلبية: ألم صدر → نقل عاجل لمركز القسطرة.<br>سموم: اتساع/ضيق الحدقة، بقايا أدوية → إعطاء الادرينالين إن وجد.`
          ],
          tip:`كل ثانية تأخير تقلل فرصة النجاة`
        },
        {
          title:"🧠 السكتة الدماغية والجلطة القلبية",
          img:"stroke_mi",
          video:"stroke_mi",
          def:`السكتة الدماغية (Stroke) تحدث عند انقطاع الدم عن جزء من الدماغ. أما الجلطة القلبية (MI) فهي انسداد مفاجئ في تروية عضلة القلب. كلاهما حالات مهددة للحياة تتطلب تدخلًا فوريًا.`,
          causes:`ارتفاع ضغط الدم، السكري، التدخين، أمراض القلب، والجلطات العابرة.`,
          sym:`<b>السكتة الدماغية (قاعدة FAST):</b><br>
          - <b>F (Face):</b> تدلي أحد جانبي الوجه عند الابتسام.<br>
          - <b>A (Arms):</b> ضعف في أحد الذراعين عند رفعهما.<br>
          - <b>S (Speech):</b> صعوبة في الكلام أو كلام غير مفهوم.<br>
          - <b>T (Time):</b> الوقت حرج جداً اتصل بالطوارئ فوراً.<br>
          <b>الجلطة القلبية:</b> ألم ضاغط في الصدر، ضيق تنفس، عرق بارد، ألم يمتد للفك أو الذراع الأيسر.`,
          steps:[
            `1️⃣ الاتصال فوراً بمدير الطوارئ أو أقرب مركز قسطرة.`,
            `2️⃣ إجلاس المصاب في وضعية مريحة (وضعية نصف الجلوس).`,
            `3️⃣ فك الملابس الضيقة حول الرقبة والخصر.`,
            `4️⃣ إذا كان واعياً ولا يوجد حساسية، يمكن إعطاؤه قرص أسبرين (مضغ) لتقليل التجلط.`,
            `5️⃣ مراقبة التنفس والنبض باستمرار؛ في حال فقدان الوعي نبدأ CPR فوراً.`
          ],
          tip:"الوقت هو الدماغ والوقت هو العضلة؛ كل دقيقة تأخير تعني تلفاً لا يمكن إصلاحه."
        },
        {
          title:"🐝 الصدمة التحسسية الحادة",
          img:"anaphylaxis",
          video:"anaphylaxis",
          def:`رد فعل تحسسي شديد وفوري يصيب كامل الجسم، مما يؤدي لضيق الممرات الهوائية وهبوط حاد في ضغط الدم.`,
          causes:`لدغات الحشرات (النحل، الدبابير)، بعض الأدوية (مثل البنسلين)، أو بعض الأطعمة.`,
          sym:`تورم الوجه واللسان، صعوبة شديدة في التنفس، طفح جلدي واسع، غثيان، دوار شديد وفقدان وعي.`,
          steps:[
            `1️⃣ إبعاد المسبب (مثل نزع إبرة النحلة دون عصرها).`,
            `2️⃣ استخدام حقنة الأدرينالين (EpiPen) إذا كانت متوفرة لدى المريض (تُحقن في عضلة الفخذ الخارجية).`,
            `3️⃣ وضع المصاب مستلقياً على ظهره مع رفع قدميه (لتحسين الضغط).`,
            `4️⃣ إذا كان هناك تورم في اللسان وصعوبة تنفس، يجب تأمين مجرى الهواء بأي وسيلة متاحة.`,
            `5️⃣ نقل المريض فوراً للمستشفى لأن مفعول الأدرينالين قد ينتهي وتعود الصدمة.`
          ],
          tip:"الأدرينالين هو المنقذ الوحيد للحياة في هذه الحالة."
        },
        {
          title:"💧 ضربة الشمس والجفاف",
          img:"heatstroke",
          video:"heatstroke",
          def:`ارتفاع درجة حرارة الجسم لأكثر من 40 درجة مئوية بسبب التعرض الطويل للحرارة، مما يؤدي لفشل نظام تنظيم الحرارة في الدماغ.`,
          causes:`العمل الشاق تحت الشمس، نقص شرب السوائل، خاصة عند الأطفال وكبار السن.`,
          sym:`ارتفاع كبير في الحرارة، جلد جاف وساخن (بدون عرق)، صداع، تشوش ذهني، تشنجات، أو فقدان وعي.`,
          steps:[
            `1️⃣ نقل المصاب فوراً إلى مكان بارد أو مظلل.`,
            `2️⃣ تبريد الجسم بسرعة: رش الماء البارد، استخدام الكمادات، أو وضع قطع ثلج تحت الإبطين وبين الفخذين.`,
            `3️⃣ إذا كان واعياً، إعطاؤه سوائل باردة أو محلول إرواء تدريجياً.`,
            `4️⃣ مراقبة علامات الجفاف الحاد (مرتبط ببروتوكول IMCI للأطفال).`,
            `5️⃣ عدم إعطاء خافضات حرارة (مثل الباراسيتامول) لأنها لا تنفع في ضربة الشمس.`
          ],
          tip:"التبريد السريع للجسم هو الأولوية القصوى لمنع تلف الدماغ."
        },
        {
          title:"🤮 الغرق",
          img:"drowning",
          video:"drowning",
          def:`فشل التنفس نتيجة انغمار الأنف والفم بالسوائل، مما يؤدي لنقص الأكسجين في الدماغ.`,
          causes:`السقوط في الآبار، السدود، أو تجمعات المياه.`,
          sym:`انقطاع التنفس، زرقة الوجه والأطراف، خروج رغوة من الفم، فقدان الوعي.`,
          steps:[
            `1️⃣ إخراج المصاب من الماء مع حماية الرقبة (خطر وجود كسر في الفقرات).`,
            `2️⃣ وضع المصاب على أرض صلبة وفحص التنفس والنبض.`,
            `3️⃣ <b>هام:</b> ابدأ بـ 5 أنفاس إنقاذية أولاً (قبل الضغطات الصدرية) لأن المشكلة تنفسية وليست قلبية في الأصل.`,
            `4️⃣ البدء بإنعاش قلبي رئوي (30 ضغطة : 2 نفس).`,
            `5️⃣ لا تحاول إخراج الماء من الرئتين بالضغط على البطن؛ الإنعاش هو الذي سيطرد الماء.`
          ],
          tip:"حتى لو أفاق المصاب، يجب نقله للمستشفى لخطر 'الغرق الثانوي' وتجمع السوائل في الرئة."
        },
        {
          title:"🤰 نزيف ما بعد الولادة",
          img:"pph",
          video:"pph",
          def:`فقدان كمية كبيرة من الدم (أكثر من 500 مل) بعد الولادة، وهو المسبب الأول لوفيات الأمهات ميدانياً.`,
          causes:`عدم انقباض الرحم (Atony)، تمزقات القناة المهبلية، أو بقاء أجزاء من المشيمة.`,
          sym:`نزيف مهبلي غزير ومستمر، شحوب، نبض سريع وضعيف، هبوط الضغط، الشعور بالدوخة.`,
          steps:[
            `1️⃣ طلب المساعدة الطبية فوراً وتجهيز وسيلة نقل.`,
            `2️⃣ عمل تدليك للرحم (Fundal Massage) بقوة من فوق البطن لتحفيزه على الانقباض.`,
            `3️⃣ وضع الأم في وضعية الصدمة (مستلقية مع رفع القدمين).`,
            `4️⃣ تشجيع الأم على التبول أو إفراغ المثانة (المثانة الممتلئة تمنع انقباض الرحم).`,
            `5️⃣ إرضاع الطفل فوراً قد يساعد في إفراز هرمون الأوكسيتوسين الطبيعي لتقبض الرحم.`
          ],
          tip:"التدليك المستمر للرحم هو الإجراء المنقذ للحياة حتى وصول المساعدة."
        },
        {
          title:"🩸 النزيف",
          img:"bleeding",

                        <tr>
                            <th style="background:#3b82f6;">الدواء العلمي</th>
                            <th style="background:#3b82f6;">دواعي الاستعمال</th>
                            <th style="background:#3b82f6;">الجرعة للبالغين</th>
                            <th style="background:#3b82f6;">الجرعة للأطفال (IMCI / الطوارئ)</th>
                            <th style="background:#3b82f6;">الملاحظات وطريقة الإعطاء</th>
                        </tr>
                        <tr>
                            <td><b>الأدرينالين</b><br>(Epinephrine 1:1,000)</td>
                            <td>الصدمة التحسسية الحادة (Anaphylaxis)</td>
                            <td>0.3 إلى 0.5 ملغ (IM)</td>
                            <td>0.01 ملغ/كغ (بحد أقصى 0.3 ملغ) (IM)</td>
                            <td>يُحقن في العضلة الأمامية الجانبية للفخذ. يُكرر كل 5-15 دقيقة إذا لزم الأمر.</td>
                        </tr>
                        <tr>
                            <td><b>الأدرينالين</b><br>(Epinephrine 1:10,000)</td>
                            <td>توقف القلب (Cardiac Arrest)</td>
                            <td>1 ملغ (IV/IO) كل 3-5 دقائق</td>
                            <td>0.01 ملغ/كغ (0.1 مل/كغ من تركيز 1:10,000) (IV/IO)</td>
                            <td>يُعطى أثناء إجراء الإنعاش القلبي الرئوي المستمر.</td>
                        </tr>
                        <tr>
                            <td><b>الأميودارون</b><br>(Amiodarone)</td>
                            <td>الرجفان البطيني أو تسرع القلب البطيني</td>
                            <td>الجرعة الأولى: 300 ملغ، الثانية: 150 ملغ (IV/IO)</td>
                            <td>5 ملغ/كغ (IV/IO) ويمكن تكرارها</td>
                            <td>يُعطى بعد الصدمة الكهربائية الثالثة في خوارزمية توقف القلب.</td>
                        </tr>
                        <tr>
                            <td><b>الأتروبين</b><br>(Atropine)</td>
                            <td>تباطؤ نبض القلب العرضي (Bradycardia)</td>
                            <td>1 ملغ (IV) تكرر كل 3-5 دقائق (حد أقصى 3 ملغ)</td>
                            <td>0.02 ملغ/كغ (IV/IO) (الحد الأدنى 0.1 ملغ)</td>
                            <td>يجب الحذر: الجرعات المنخفضة جداً قد تسبب تباطؤ انعكاسي في النبض.</td>
                        </tr>
                        <tr>
                            <td><b>الأسبرين</b><br>(Aspirin)</td>
                            <td>الجلطة القلبية / متلازمة الشريان التاجي</td>
                            <td>160 إلى 325 ملغ (مضغ)</td>
                            <td>غير موصى به روتينياً للأطفال في الطوارئ</td>
                            <td>يجب مضغ الأقراص لتسريع الامتصاص. يُمنع استخدامه في حال وجود نزيف نشط.</td>
                        </tr>
                        <tr>
                            <td><b>سالبوتامول</b><br>(Salbutamol)</td>
                            <td>نوبات الربو وتشنج القصبات الهوائية</td>
                            <td>2.5 إلى 5 ملغ عبر جهاز الرذاذ (Nebulizer)</td>
                            <td>2.5 ملغ (وزن < 20 كغ) أو 5 ملغ (وزن > 20 كغ)</td>
                            <td>يمكن تكراره كل 20 دقيقة للجرعات الثلاث الأولى. أساسي في بروتوكول IMCI للتعامل مع صعوبة التنفس.</td>
                        </tr>
                        <tr>
                            <td><b>ديازيبام</b><br>(Diazepam)</td>
                            <td>النوبات التشنجية والاختلاج المستمر</td>
                            <td>5 إلى 10 ملغ (IV) ببطء</td>
                            <td>0.1 - 0.2 ملغ/كغ (IV) أو 0.5 ملغ/كغ (شرجياً)</td>
                            <td>تتم المراقبة المستمرة للتنفس لاحتمالية حدوث تثبيط تنفسي.</td>
                        </tr>
                        <tr>
                            <td><b>دكستروز</b><br>(Dextrose 10% / 50%)</td>
                            <td>نقص سكر الدم الحاد (Hypoglycemia)</td>
                            <td>25 - 50 غرام (D50W) (IV)</td>
                            <td>2 - 5 مل/كغ من (D10W) (IV) للرضع والأطفال</td>
                            <td>يجب التأكد من الأوردة الطرفية لتجنب تسرب المحلول والنخر النسيجي.</td>
                        </tr>
                        <tr>
                            <td><b>نالوكسون</b><br>(Naloxone)</td>
                            <td>التسمم بالمواد الأفيونية (تثبيط تنفسي)</td>
                            <td>0.4 إلى 2 ملغ (IV/IM/IN)</td>
                            <td>0.1 ملغ/كغ (بحد أقصى 2 ملغ)</td>
                            <td>يُكرر كل 2-3 دقائق. الهدف استعادة التنفس الكافي وليس استعادة الوعي الكامل.</td>
                        </tr>
                        <tr>
                            <td><b>هيدروكورتيزون</b><br>(Hydrocortisone)</td>
                            <td>الربو الشديد / الصدمة التحسسية (علاج داعم)</td>
                            <td>100 إلى 200 ملغ (IV)</td>
                            <td>4 إلى 8 ملغ/كغ (IV) بحد أقصى 250 ملغ</td>
                            <td>يحتاج لوقت ليبدأ مفعوله، ولا يعتبر بديلاً للأدرينالين في الدقائق الأولى من الصدمة التحسسية.</td>
                        </tr>
                    </table>
                </div>

                <div class="info-box" style="border-right-color:#3b82f6; margin-top:25px;">
                    <h3>📝 ملاحظات عامة حول قسم الأدوية وتحديثات البروتوكول:</h3>
                    <textarea id="noteInput_drugs" class="note-input" placeholder="اكتب ملاحظاتك الطبية هنا... سيتم حفظها تلقائياً عند الضغط على حفظ وتظهر في الطباعة.">${savedDrugsNote}</textarea>
                    <div style="display:flex; align-items:center;">
                        <button class="save-btn" onclick="saveDrugsNote()">💾 حفظ الملاحظة</button>
                        <span id="saveStatus_drugs" class="save-status">تم الحفظ بنجاح ✓</span>
                    </div>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveNote(caseIndex) {
            const noteContent = document.getElementById(`noteInput_${caseIndex}`).value;
            localStorage.setItem('case_note_' + caseIndex, noteContent);
            
            const statusLabel = document.getElementById(`saveStatus_${caseIndex}`);
            statusLabel.style.opacity = "1";
            setTimeout(() => {
                statusLabel.style.opacity = "0";
            }, 2500);
        }

        function saveDrugsNote() {
            const noteContent = document.getElementById(`noteInput_drugs`).value;
            localStorage.setItem('drugs_note', noteContent);
            
            const statusLabel = document.getElementById(`saveStatus_drugs`);
            statusLabel.style.opacity = "1";
            setTimeout(() => {
                statusLabel.style.opacity = "0";
            }, 2500);
        }

        function goBack() {
            document.getElementById("caseView").style.display = "none";
            document.getElementById("tocGrid").style.display = "grid";
            document.getElementById("bottomControls").style.display = "flex";
            document.getElementById("headerTitle").innerText = "القائمة الرئيسية";
            document.getElementById("progressBar").style.width = "0%";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleTheme() { 
            document.body.classList.toggle("light"); 
        }
    </script>
</body>
</html>
