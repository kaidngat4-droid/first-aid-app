<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ لا يوجد اتصال بالإنترنت</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 15px; color: #ef4444; }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 20px; opacity: 0.9; }
        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #dc2626; }
        .note { font-size: 12px; margin-top: 20px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🌐</div>
        <h1>⚠️ لا يوجد اتصال بالإنترنت</h1>
        <p>عذراً، أنت حالياً غير متصل بالإنترنت.<br>بعض المحتويات قد لا تكون متاحة.<br>يرجى التحقق من اتصالك والمحاولة مرة أخرى.</p>
        <button onclick="location.reload()">🔄 إعادة المحاولة</button>
        <p class="note">تم تحميل هذا التطبيق مسبقاً. المحتويات الأساسية متاحة دون اتصال.</p>
    </div>
</body>
</html>
